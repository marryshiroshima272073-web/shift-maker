<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>休み希望フォーム</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #F2F7F9;
      --surface:   #FFFFFF;
      --primary:   #2A7D9C;
      --primary-d: #1F5F78;
      --accent:    #4BBFA0;
      --text:      #1E2D3A;
      --muted:     #7A8F9C;
      --border:    #D3E4EC;
      --error:     #D64045;
      --hist-bg:   #F0FAF7;
      --hist-bdr:  #B2E0D4;
      --r-card: 14px; --r-btn: 10px; --r-inp: 8px;
      --shadow: 0 2px 12px rgba(42,125,156,.10);
    }
    html,body {
      background:var(--bg); color:var(--text);
      font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
      font-size:15px; line-height:1.6;
      -webkit-font-smoothing:antialiased;
    }
    .page { max-width:480px; margin:0 auto; padding:0 0 56px; }

    /* ヘッダー */
    .header {
      background:linear-gradient(135deg,var(--primary) 0%,#1a8fa8 100%);
      padding:28px 20px 22px;
      display:flex; align-items:center; gap:14px; position:relative;
    }
    .header::after {
      content:''; position:absolute; bottom:-12px; left:0; right:0;
      height:12px; background:var(--bg); border-radius:14px 14px 0 0;
    }
    .avatar-wrap {
      flex-shrink:0; width:56px; height:56px; border-radius:50%;
      background:rgba(255,255,255,.25); border:2.5px solid rgba(255,255,255,.6);
      overflow:hidden; display:flex; align-items:center; justify-content:center;
    }
    #avatar { width:100%; height:100%; object-fit:cover; display:none; }
    .avatar-ph { font-size:26px; color:rgba(255,255,255,.8); }
    .header-info { flex:1; }
    .header-lbl { font-size:11px; color:rgba(255,255,255,.75); letter-spacing:.06em; }
    #userName { font-size:18px; font-weight:700; color:#fff; word-break:break-all; }
    .header-title {
      position:absolute; right:18px; top:14px;
      font-size:11px; font-weight:600; color:rgba(255,255,255,.6);
    }

    /* 共通カード */
    .card {
      background:var(--surface); border-radius:var(--r-card);
      box-shadow:var(--shadow); padding:18px 16px; margin:20px 14px 0;
    }
    .sec-label {
      display:flex; align-items:center; gap:8px;
      font-size:12px; font-weight:700; letter-spacing:.08em;
      color:var(--primary); text-transform:uppercase; margin-bottom:14px;
    }
    .sec-label .dot { width:6px; height:6px; border-radius:50%; background:var(--accent); flex-shrink:0; }

    /* 「休み希望日を追加」ボタン */
    .btn-open-date {
      width:100%; height:54px;
      border:1.5px dashed var(--primary); border-radius:var(--r-inp);
      background:#EAF4F7; color:var(--primary);
      font-size:15px; font-weight:700; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:8px;
      transition:background .15s,transform .1s;
      -webkit-tap-highlight-color:transparent;
    }
    .btn-open-date:active { background:#DCEBF0; transform:scale(.98); }
    .btn-open-date-icon { font-size:18px; }
    /* 実体の日付inputは非表示にして、ボタン経由でのみ開く */
    .date-input-hidden {
      position:absolute; width:1px; height:1px;
      padding:0; margin:-1px; overflow:hidden;
      clip:rect(0,0,0,0); white-space:nowrap; border:0;
    }

    /* 下書き入力カード（日付選択直後〜「決定」まで） */
    .draft-card {
      display:none;
      border:1.5px solid var(--primary); border-radius:12px;
      padding:14px 14px 12px; background:#EAF4F7;
      margin-top:12px; animation:entryIn .2s ease;
    }
    .draft-card.show { display:block; }
    .draft-head { margin-bottom:10px; }
    .draft-date-lbl { font-size:15px; font-weight:700; color:var(--primary); }
    .draft-actions { display:flex; gap:8px; margin-top:4px; }
    .btn-draft-cancel {
      flex:1; height:44px;
      border:1.5px solid var(--border); border-radius:var(--r-inp);
      background:#fff; color:var(--muted);
      font-size:14px; font-weight:700; cursor:pointer;
      transition:background .15s; -webkit-tap-highlight-color:transparent;
    }
    .btn-draft-cancel:active { background:var(--bg); }
    .draft-actions .btn-add { flex:1; justify-content:center; }

    /* 日付追加行 */
    .add-row { display:flex; gap:8px; align-items:center; }
    input[type="date"] {
      flex:1; height:44px; min-width:0;
      border:1.5px solid var(--border); border-radius:var(--r-inp);
